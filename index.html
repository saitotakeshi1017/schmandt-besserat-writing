<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chapter 10 - Tokens Mastery Quiz v4</title>
<style>
  :root {
    --bg:        #F5EFE0;
    --bg-soft:   #EDE4D0;
    --card:      #FBF7EC;
    --ink:       #2E3A3A;
    --muted:     #6B7775;
    --accent:    #5B8A8A;
    --accent-d:  #406A6A;
    --good:      #7BA77B;
    --good-bg:   #DFEBDC;
    --bad:       #B8746B;
    --bad-bg:    #EFD9D3;
    --hi:        #E8C97A;
    --line:      #d8cfba;
    --shadow:    0 2px 0 rgba(46,58,58,0.08), 0 6px 18px rgba(46,58,58,0.06);
    --radius:    14px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height:1.55; min-height:100vh; display:flex; justify-content:center;
    padding:24px 14px 60px;
  }
  .wrap { width:100%; max-width:820px; }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.45rem; margin:0 0 4px; color:var(--accent-d); letter-spacing:.3px; }
  header p { margin:0; color:var(--muted); font-size:.9rem; }
  .bar { display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center; background:var(--bg-soft); padding:9px 13px; border-radius:var(--radius); font-size:.88rem; color:var(--muted); margin-bottom:10px; }
  .bar strong { color:var(--ink); font-weight:600; }
  .bar .pill { background:var(--card); padding:3px 10px; border-radius:999px; border:1px solid var(--line); }
  .jump { display:flex; flex-wrap:wrap; gap:7px; margin:0 0 12px; justify-content:center; }
  .jump button { background:var(--card); color:var(--accent-d); border:1px solid var(--line); border-radius:10px; padding:7px 10px; font-weight:700; cursor:pointer; min-width:34px; }
  .jump button.current { background:var(--accent); color:#fff; border-color:var(--accent-d); }
  .jump button.done { background:var(--good-bg); border-color:var(--good); }
  .jump button.miss { background:var(--bad-bg); border-color:var(--bad); }
  .progress-track { width:100%; height:6px; background:var(--bg-soft); border-radius:999px; overflow:hidden; margin-bottom:16px; }
  .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .3s ease; }
  .card { background:var(--card); border-radius:var(--radius); padding:24px 22px 20px; box-shadow:var(--shadow); }
  .qnum { font-size:.75rem; letter-spacing:1.2px; color:var(--accent); text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .qtype-tag { display:inline-block; margin-left:8px; padding:2px 8px; border-radius:999px; background:var(--hi); color:#6b4f1a; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:1.08rem; margin:4px 0 16px; color:var(--ink); }
  code { background:var(--hi); padding:1px 6px; border-radius:4px; font-family:"SF Mono", Menlo, Consolas, monospace; font-size:.92em; }
  .options { display:grid; gap:9px; }
  .opt {
    text-align:left; background:#FFFDF6; border:1.5px solid var(--line); color:var(--ink);
    padding:11px 13px; border-radius:10px; font-size:.96rem; cursor:pointer;
    transition:all .15s ease; font-family:inherit; line-height:1.45; width:100%;
    display:flex; align-items:center; white-space:nowrap; overflow:hidden;
  }
  .opt:hover:not(:disabled) { border-color:var(--accent); background:#FFFEFA; transform:translateY(-1px); }
  .opt:disabled { cursor:default; }
  .opt.correct, .opt.reveal { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .opt.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; }
  .marker { display:inline-block; width:22px; height:22px; line-height:22px; border-radius:50%; background:var(--bg-soft); color:var(--muted); text-align:center; font-size:.78rem; margin-right:10px; font-weight:700; flex:0 0 auto; }
  .opt.correct .marker, .opt.reveal .marker { background:var(--good); color:white; }
  .opt.wrong .marker { background:var(--bad); color:white; }
  .optText { display:inline-block; overflow:hidden; text-overflow:ellipsis; }
  .dd-hint { font-size:.85rem; color:var(--accent-d); margin-bottom:14px; padding:8px 12px; background:rgba(91,138,138,.08); border-radius:8px; border-left:3px solid var(--accent); }
  .dd-card { background:var(--card); border:1.5px solid var(--accent); color:var(--accent-d); padding:7px 12px; border-radius:8px; font-size:.9rem; cursor:pointer; font-weight:500; user-select:none; transition:all .15s ease; font-family:inherit; line-height:1.4; text-align:left; }
  .dd-card:hover:not(:disabled) { background:#fff; }
  .dd-card.selected { background:var(--accent); color:white; transform:scale(1.04); box-shadow:0 0 0 3px rgba(91,138,138,.25); }
  .dd-card.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; cursor:default; }
  .dd-card.wrong { background:var(--bad-bg); border-color:var(--bad); color:#5a2c26; cursor:default; }
  .slot-target { border:2px dashed var(--line); border-radius:8px; background:var(--bg-soft); padding:5px; min-height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .15s ease; }
  .slot-target:hover { border-color:var(--accent); }
  .slot-target.has-card { border-style:solid; background:#fbf3df; padding:4px; }
  .slot-target.correct { border-color:var(--good); background:var(--good-bg); border-style:solid; }
  .slot-target.wrong { border-color:var(--bad); background:var(--bad-bg); border-style:solid; }
  .slot-target .placeholder { color:var(--muted); font-size:.82rem; }
  .slot-target .dd-card { width:100%; }
  .match-list, .order-list { display:flex; flex-direction:column; gap:8px; }
  .match-row { display:flex; align-items:center; gap:10px; }
  .match-label { flex:1; font-size:.9rem; color:var(--ink); }
  .match-row .slot-target { width:260px; flex:none; }
  .order-row { display:flex; align-items:stretch; gap:10px; }
  .order-num { width:34px; min-height:44px; border-radius:8px; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; font-size:1rem; }
  .order-row .slot-target { flex:1; }
  .card-bank { margin-top:14px; padding:11px 12px; background:var(--bg-soft); border-radius:10px; border:1px solid var(--line); }
  .card-bank-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:600; }
  .card-bank-cards { display:flex; flex-wrap:wrap; gap:6px; min-height:30px; }
  .fillbox { display:grid; gap:10px; }
  .fill-row { background:#FFFDF6; border:1.5px solid var(--line); border-radius:10px; padding:12px 13px; font-size:.96rem; }
  .fill-row input { font:inherit; font-weight:600; color:var(--ink); padding:6px 8px; margin:0 4px; border-radius:8px; border:1.5px solid var(--line); background:#fff; min-width:170px; max-width:100%; }
  .fill-row input.correct { background:var(--good-bg); border-color:var(--good); color:#2f4a2f; }
  .feedback { margin-top:14px; padding:11px 13px; border-radius:10px; font-size:.92rem; display:none; line-height:1.5; }
  .feedback.good { background:var(--good-bg); color:#2f4a2f; display:block; }
  .feedback.bad { background:var(--bad-bg); color:#5a2c26; display:block; }
  .feedback.info { background:var(--bg-soft); color:var(--ink); display:block; }
  .actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
  button.btn { background:var(--accent); color:#FBF7EC; border:none; padding:11px 18px; border-radius:10px; font-size:.96rem; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s ease, transform .1s ease; }
  button.btn:hover { background:var(--accent-d); }
  button.btn:active { transform:translateY(1px); }
  button.btn.ghost { background:transparent; color:var(--accent-d); border:1.5px solid var(--accent); }
  button.btn.ghost:hover { background:var(--bg-soft); }
  .result { text-align:center; padding:12px 6px 6px; }
  .result h2 { margin:0 0 6px; color:var(--accent-d); font-size:1.5rem; }
  .score-big { font-size:2.6rem; font-weight:700; color:var(--ink); margin:12px 0 4px; }
  .review-list { text-align:left; margin:16px 0 6px; max-height:260px; overflow-y:auto; border-top:1px dashed var(--line); padding-top:12px; }
  .review-item { background:var(--bg-soft); border-left:3px solid var(--bad); padding:9px 11px; border-radius:8px; margin-bottom:7px; font-size:.88rem; }
  footer { text-align:center; color:var(--muted); font-size:.78rem; margin-top:20px; }
  @media (max-width: 560px) {
    body { padding:14px 10px 40px; }
    .card { padding:20px 16px 18px; }
    .qtext { font-size:1rem; }
    header h1 { font-size:1.25rem; }
    .match-row { flex-direction:column; align-items:stretch; gap:4px; }
    .match-row .slot-target { width:100%; }
    .opt { white-space:normal; }
    .fill-row input { width:100%; margin:8px 0 0; }
  }
</style>

<script>
const BANK = [{"id": "q01", "type": "mcq", "title": "ERC-20 is...", "source": "Chapter 10: ERC-20 Token Standard", "prompt": "ERC-20 is... Choose the best plain-English meaning.", "options": [{"text": "a rule set for equal tokens", "correct": true}, {"text": "a coin owned by the protocol", "correct": false}, {"text": "a wallet made for all tokens", "correct": false}, {"text": "a chain for selling new assets", "correct": false}], "explanation": "ERC-20 is the common interface standard for fungible tokens. It tells token contracts which functions and events wallets, exchanges, and DApps can expect. The token logic still lives inside a smart contract."}, {"id": "q02", "type": "matching", "title": "What tokens can represent", "source": "How Tokens Are Used", "prompt": "Match each token use to a clear example. This compresses the chapter's token-use list.", "pairs": [{"left": "Currency", "right": "a privately traded unit of value"}, {"left": "Resource", "right": "storage or CPU time on a network"}, {"left": "Asset", "right": "gold, land, art, energy, or game items"}, {"left": "Access", "right": "entry to a website, room, or service"}, {"left": "Equity", "right": "ownership or control in a project"}, {"left": "Voting", "right": "a right to take part in decisions"}, {"left": "Identity", "right": "an avatar, account identity, or legal ID"}, {"left": "Attestation", "right": "a certificate, record, or proof of fact"}], "explanation": "Tokens are not only private money. They can represent currency, resources, assets, access, equity, voting, collectibles, identity, attestations, and utility."}, {"id": "q03", "type": "matching", "title": "Fungible, nonfungible, and unique IDs", "source": "Tokens and Fungibility / ERC-721", "prompt": "Match each idea to the clearest meaning.", "pairs": [{"left": "Fungible token", "right": "each unit can replace another unit"}, {"left": "Nonfungible token", "right": "each unit represents something unique"}, {"left": "ERC-20", "right": "standard mainly used for equal units"}, {"left": "ERC-721", "right": "standard mainly used for unique items"}, {"left": "Token ID", "right": "a number that identifies one NFT"}], "explanation": "Fungible tokens are interchangeable. NFTs are not interchangeable because each token has a distinct identity, usually represented by a token ID."}, {"id": "q04", "type": "mcq", "title": "Counterparty risk", "source": "Counterparty Risk / Intrinsicality", "prompt": "What creates extra counterparty risk when a token represents a real-world asset?", "options": [{"text": "someone must honor the asset", "correct": true}, {"text": "validators must print the asset", "correct": false}, {"text": "wallets must hide the asset", "correct": false}, {"text": "miners must freeze the asset", "correct": false}], "explanation": "If a token represents real estate, gold, bonds, or similar outside assets, someone or some legal system must recognize and enforce the link. That outside dependency adds counterparty risk."}, {"id": "q05", "type": "matching", "title": "Intrinsic and extrinsic assets", "source": "Tokens and Intrinsicality", "prompt": "Match the asset type to the correct description.", "pairs": [{"left": "Intrinsic asset", "right": "exists inside blockchain consensus rules"}, {"left": "Extrinsic asset", "right": "exists outside the blockchain system"}, {"left": "CryptoKitty example", "right": "ownership follows control of keys"}, {"left": "Gold bar example", "right": "ownership depends on a custodian"}, {"left": "DAO equity token", "right": "can make ownership more blockchain-native"}], "explanation": "Intrinsic assets are governed by blockchain consensus. Extrinsic assets depend on law, policy, registries, or custodians outside the chain."}, {"id": "q06", "type": "mcq", "title": "Utility, equity, or hype", "source": "Utility, Equity, or Cash Grab? / It's a Duck!", "prompt": "Which question best tests whether a token is useful rather than only hype?", "options": [{"text": "does it serve a needed role", "correct": true}, {"text": "does it rise in price fast", "correct": false}, {"text": "does it sound like a stock", "correct": false}, {"text": "does it use a famous meme", "correct": false}], "explanation": "The chapter warns that many tokens are launched for speculation. A serious question is whether the protocol truly needs the token, or whether it is mostly fundraising and hype."}, {"id": "q07", "type": "mcq", "title": "Tokens versus ether", "source": "Tokens on Ethereum / Issues with ERC-20 Tokens", "prompt": "What is the key difference between ether transfers and ERC-20 token transfers?", "options": [{"text": "ether changes accounts; tokens change contracts", "correct": true}, {"text": "ether uses mappings; tokens use wallets", "correct": false}, {"text": "ether needs approval; tokens need mining", "correct": false}, {"text": "ether lives offchain; tokens live onchain", "correct": false}], "explanation": "Ether balances are handled by the Ethereum protocol. ERC-20 token balances are tracked inside the token smart contract, usually through mappings. A token transfer updates the token contract state."}, {"id": "q08", "type": "matching", "title": "ERC-20 required interface", "source": "ERC-20 Required Functions and Events", "prompt": "Match each required ERC-20 item to what it does.", "pairs": [{"left": "totalSupply", "right": "returns how many token units exist"}, {"left": "balanceOf", "right": "returns one address's token balance"}, {"left": "transfer", "right": "moves tokens from the caller"}, {"left": "approve", "right": "sets a spender's allowed amount"}, {"left": "transferFrom", "right": "moves tokens using approval"}, {"left": "allowance", "right": "shows approval still remaining"}, {"left": "Transfer event", "right": "logs a successful token move"}, {"left": "Approval event", "right": "logs a successful approval"}], "explanation": "ERC-20's required interface includes six functions and two events. These let tools interact with compatible token contracts in a predictable way."}, {"id": "q09", "type": "matching", "title": "Optional ERC-20 details and mappings", "source": "ERC-20 Optional Functions / Data Structures", "prompt": "Match each detail to the correct meaning.", "pairs": [{"left": "name", "right": "human-readable token name"}, {"left": "symbol", "right": "short human-readable ticker"}, {"left": "decimals", "right": "places used for token units"}, {"left": "_balances mapping", "right": "owner address to token amount"}, {"left": "_allowances mapping", "right": "owner to spender to approved amount"}], "explanation": "ERC-20 often includes name, symbol, and decimals. Implementations usually keep balances in one mapping and allowances in a nested mapping."}, {"id": "q10", "type": "sequence", "title": "Direct transfer workflow", "source": "ERC-20 workflows: transfer", "prompt": "Put the direct ERC-20 transfer workflow in order.", "items": ["Alice's wallet calls transfer with Bob and the amount.", "The transaction is sent to the token contract address.", "The contract subtracts tokens from Alice's balance.", "The contract adds tokens to Bob's balance.", "The contract emits a Transfer event."], "explanation": "In ERC-20, the recipient is recorded in the token contract's state. The transaction itself goes to the token contract, not to Bob's address."}, {"id": "q11", "type": "sequence", "title": "approve and transferFrom workflow", "source": "ERC-20 workflows: approve and transferFrom", "prompt": "Arrange the two-step approval workflow used by contracts such as token sales or faucets.", "items": ["Owner deploys or holds the token supply.", "Owner approves another address to spend a set amount.", "The approved contract receives a user's request or payment.", "The approved contract calls transferFrom on the token.", "The token contract moves tokens within the allowance."], "explanation": "approve gives another address permission. transferFrom uses that permission to move tokens from the owner to a recipient, as long as the allowance is not exceeded."}, {"id": "q12", "type": "mcq", "title": "ERC-2612 permit", "source": "ERC-2612: Gasless transfers with permit", "prompt": "What does ERC-2612 permit improve in the ERC-20 approval flow?", "options": [{"text": "approval can start with a signature", "correct": true}, {"text": "tokens can ignore all balances", "correct": false}, {"text": "contracts can skip every event", "correct": false}, {"text": "wallets can remove all gas", "correct": false}], "explanation": "ERC-2612 lets users approve allowances by signing data off-chain. Another party can submit the signature to permit, reducing the need for a separate on-chain approval transaction by the owner."}, {"id": "q13", "type": "matching", "title": "Building METoken with Foundry", "source": "Launching Our Own ERC-20 Token", "prompt": "Match each implementation detail to its role in the METoken example.", "pairs": [{"left": "OpenZeppelin ERC20", "right": "battle-tested base token contract"}, {"left": "ERC20('METoken','MET')", "right": "sets the token name and symbol"}, {"left": "_mint(msg.sender, initialSupply)", "right": "gives initial supply to deployer"}, {"left": "50_000_000e18", "right": "fifty million tokens with decimals"}, {"left": "forge build", "right": "compiles the Foundry project"}, {"left": "--broadcast", "right": "sends the deployment transaction"}], "explanation": "The METoken contract inherits from OpenZeppelin ERC20, sets name and symbol in the constructor, and mints the initial supply to the deployer."}, {"id": "q14", "type": "mcq", "title": "Why tokens get stuck", "source": "Sending ERC-20 Tokens to Contract Addresses", "prompt": "Why did MET sent to NaiveFaucet become stuck?", "options": [{"text": "the faucet lacked token-transfer code", "correct": true}, {"text": "the faucet rejected every contract call", "correct": false}, {"text": "the token lacked a balance mapping", "correct": false}, {"text": "the token erased the deployer key", "correct": false}], "explanation": "NaiveFaucet could withdraw ether but had no code to call METoken.transfer. Since only the faucet contract could move its own ERC-20 balance, the MET was stuck forever."}, {"id": "q15", "type": "sequence", "title": "METFaucet fix with transferFrom", "source": "Demonstrating approve and transferFrom", "prompt": "Put the fixed faucet workflow in order.", "items": ["Deploy METFaucet with the token address and owner address.", "The MET owner approves the faucet to spend tokens.", "Alice calls the faucet withdraw function.", "The faucet calls METoken.transferFrom.", "METoken moves tokens from owner to Alice."], "explanation": "METFaucet does not hold the token balance itself. It uses approval plus transferFrom to move MET from the owner to the user requesting tokens."}, {"id": "q16", "type": "matching", "title": "Later token standards and checks", "source": "ERC-223 / ERC-777 / ERC-721 / ERC-1155 / EIP-165", "prompt": "Match each standard or proposal to the chapter's main point.", "pairs": [{"left": "ERC-223", "right": "tries to stop transfers to unsupported contracts"}, {"left": "ERC-777", "right": "uses hooks but can raise reentry risk"}, {"left": "ERC-721", "right": "tracks unique tokens with token IDs"}, {"left": "ERC-1155", "right": "manages many token types in one contract"}, {"left": "EIP-165", "right": "lets contracts report supported interfaces"}, {"left": "OpenZeppelin", "right": "offers safer battle-tested implementations"}], "explanation": "The chapter surveys standards that address different token needs: safer receipt, hooks, NFTs, multitokens, interface detection, and mature implementations."}, {"id": "q17", "type": "fill", "title": "NFT full name", "source": "ERC-721: NFT Standard", "prompt": "Type the missing words. This question fixes the full name behind NFT.", "sentences": [{"before": "NFT stands for ", "after": ".", "answers": ["nonfungible token", "non-fungible token", "Nonfungible Token", "Non-Fungible Token"]}, {"before": "ERC-721 is the token standard for ", "after": " tokens.", "answers": ["nonfungible", "non-fungible"]}], "explanation": "NFT means nonfungible token. ERC-721 is the Ethereum standard used for nonfungible tokens, where each token can represent a distinct item."}];
let order = [], pos = 0, score = 0, round = 1, wrongLog = [], answered = false;
let states = {};
let dragState = { selected:null, placements:{} };
let currentDD = null;
const STORE_PREFIX = 'tokens_ch10_v4_';
const elCard = document.getElementById('card'), elQIdx = document.getElementById('qIdx'), elQTotal = document.getElementById('qTotal'), elScore = document.getElementById('score'), elRound = document.getElementById('round'), elBest = document.getElementById('best'), elCompleted = document.getElementById('completed'), elProg = document.getElementById('progress'), elJump = document.getElementById('jump');
elQTotal.textContent = BANK.length;
function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function norm(s) { return String(s||'').toLowerCase().replace(/[.,;:!?()[\]{}"']/g,'').replace(/\s+/g,' ').trim(); }
function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); } catch(e) {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch(e) {} }
function startRound() { order = shuffle(BANK.map((_,i)=>i)); pos=0; score=0; wrongLog=[]; states={}; elScore.textContent='0'; elRound.textContent=round; elBest.textContent=lsGet(STORE_PREFIX+'best') || '—'; elCompleted.textContent=lsGet(STORE_PREFIX+'completed') || '0'; renderJump(); renderQuestion(); }
function renderJump() { elJump.innerHTML=''; order.forEach((qi,i)=>{ const q=BANK[qi]; const st=states[q.id]; const b=document.createElement('button'); b.textContent=i+1; b.className=(i===pos?'current ':'')+(st?.answered?(st.correct?'done':'miss'):''); b.onclick=()=>{pos=i; renderQuestion();}; elJump.appendChild(b); }); }
function currentQ() { return BANK[order[pos]]; }
function renderQuestion() { if(pos>=order.length) return renderResult(); answered=false; dragState={selected:null,placements:{}}; currentDD=null; const item=currentQ(); elQIdx.textContent=pos+1; elProg.style.width=(pos/order.length*100)+'%'; const tagMap={mcq:'Multiple Choice',matching:'Drag & Match',sequence:'Drag & Order',fill:'Fill In'}; let html=`<div class="qnum">Question ${pos+1} of ${order.length}<span class="qtype-tag">${tagMap[item.type]}</span></div><p class="qtext">${item.prompt}</p>`; if(item.type==='mcq') html+=renderMC_HTML(item); else if(item.type==='fill') html+=renderFill_HTML(item); else html+=renderDD_HTML(item); html += `<div class="feedback" id="fb"></div><div class="actions" id="acts"><button class="btn ghost" onclick="prevQ()">Previous</button><button class="btn ghost" onclick="nextQ()">Next</button><button class="btn ghost" onclick="showAnswer()">Show answer</button><button class="btn ghost" onclick="resetQuestion()">Reset question</button></div>`; elCard.innerHTML=html; if(item.type==='mcq') attachMC(item); else if(item.type==='fill') attachFill(item); else attachDD(item); renderJump(); }
function renderMC_HTML(item) { const idxs=shuffle(item.options.map((_,i)=>i)); item._shuf=idxs; return `<div class="options">${idxs.map((orig,i)=>`<button class="opt" data-i="${i}"><span class="marker">${String.fromCharCode(65+i)}</span><span class="optText">${escapeHTML(item.options[orig].text)}</span></button>`).join('')}</div><p class="small">Choices are kept short and visually balanced. Read the prompt carefully.</p>`; }
function attachMC(item) { document.querySelectorAll('.opt').forEach(btn=>{ btn.onclick=()=>{ if(answered)return; answered=true; const shownIndex=+btn.dataset.i; const orig=item._shuf[shownIndex]; const ok=!!item.options[orig].correct; document.querySelectorAll('.opt').forEach((b,k)=>{b.disabled=true; if(item.options[item._shuf[k]].correct)b.classList.add('reveal');}); btn.classList.add(ok?'correct':'wrong'); mark(ok); feedback((ok?'Correct. ':'Not quite. ')+item.explanation, ok?'good':'bad'); }; }); }
function renderFill_HTML(item) { return `<div class="fillbox">${item.sentences.map((s,i)=>`<label class="fill-row">${escapeHTML(s.before)}<input data-fill="${i}" autocomplete="off" autocapitalize="none" spellcheck="false" />${escapeHTML(s.after)}</label>`).join('')}</div><p class="small">Type the missing word or phrase. Correct blanks lock automatically.</p>`; }
function attachFill(item) { document.querySelectorAll('input[data-fill]').forEach(inp=>{ inp.addEventListener('input', checkFill); }); }
function checkFill() { const item=currentQ(); const inputs=[...document.querySelectorAll('input[data-fill]')]; let allCorrect=true, allFilled=true; inputs.forEach(inp=>{ const s=item.sentences[+inp.dataset.fill]; const ok=s.answers.some(a=>norm(a)===norm(inp.value)); if(ok){inp.classList.add('correct'); inp.disabled=true;} if(!ok) allCorrect=false; if(!inp.value.trim()) allFilled=false; }); if(allCorrect){ answered=true; mark(true); feedback('Correct. '+item.explanation,'good'); } else if(allFilled){ feedback('Keep going. One or more blanks still need revision.','info'); } }
function setupDD(item) { let cards, slots, slotOrder; if(item.type==='matching'){ cards=item.pairs.map((p,i)=>({id:'c'+i,text:p.right,correctSlot:'s'+i})); slots=item.pairs.map((p,i)=>({id:'s'+i,label:p.left,multi:false})); slotOrder=shuffle(slots.map(s=>s.id)); } else { cards=item.items.map((t,i)=>({id:'c'+i,text:t,correctSlot:'s'+i})); slots=item.items.map((_,i)=>({id:'s'+i,label:String(i+1),multi:false})); slotOrder=slots.map(s=>s.id); } return {cards,slots,slotOrder,cardOrder:shuffle(cards.map(c=>c.id)),type:item.type}; }
function renderDD_HTML(item) { currentDD=setupDD(item); const hint=item.type==='matching'?'Tap a card, then tap its matching slot. Tap a placed card to return it.':'Tap a card, then tap the correct numbered step. Tap a placed card to return it.'; return `<div class="dd-hint">🌿 ${hint}</div><div id="ddArea"></div>`; }
function attachDD(item) { renderDDArea(item); }
function renderDDArea(item) { const area=document.getElementById('ddArea'); let h=''; if(currentDD.type==='matching') h+=renderMatchSlots(); else h+=renderOrderSlots(); const inBank=currentDD.cardOrder.filter(cid=>!dragState.placements[cid]); h+=`<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards">${inBank.length?inBank.map(cid=>{const c=currentDD.cards.find(x=>x.id===cid); const sel=dragState.selected===cid?' selected':''; return `<button class="dd-card${sel}" data-card="${cid}">${escapeHTML(c.text)}</button>`;}).join(''):'<span class="small">All placed.</span>'}</div></div>`; area.innerHTML=h; area.querySelectorAll('.dd-card').forEach(el=>{el.onclick=e=>{e.stopPropagation(); onCardClick(item,el.dataset.card);}}); area.querySelectorAll('[data-slot]').forEach(el=>{el.onclick=()=>onSlotClick(item,el.dataset.slot);}); autoCheckDD(item,false); }
function renderMatchSlots() { return `<div class="match-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="match-row"><div class="match-label">${escapeHTML(slot.label)}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function renderOrderSlots() { return `<div class="order-list">${currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid); return `<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(sid)}</div>`;}).join('')}</div>`; }
function slotHTML(sid) { const cardId=Object.keys(dragState.placements).find(cid=>dragState.placements[cid]===sid); if(cardId){const c=currentDD.cards.find(x=>x.id===cardId); return `<div class="slot-target has-card" data-slot="${sid}"><button class="dd-card" data-card="${cardId}">${escapeHTML(c.text)}</button></div>`;} return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">tap to place</span></div>`; }
function onCardClick(item,cardId) { if(answered)return; if(dragState.placements[cardId]){ delete dragState.placements[cardId]; dragState.selected=null; } else { dragState.selected=(dragState.selected===cardId)?null:cardId; } renderDDArea(item); }
function onSlotClick(item,slotId) { if(answered||!dragState.selected)return; Object.keys(dragState.placements).forEach(cid=>{if(dragState.placements[cid]===slotId)delete dragState.placements[cid];}); dragState.placements[dragState.selected]=slotId; dragState.selected=null; renderDDArea(item); }
function autoCheckDD(item,force) { if(!currentDD)return; const allPlaced=currentDD.cards.every(c=>dragState.placements[c.id]); if(!allPlaced&&!force)return; const results={}; let count=0; currentDD.cards.forEach(c=>{const ok=dragState.placements[c.id]===c.correctSlot; results[c.id]=ok; if(ok)count++;}); const all=count===currentDD.cards.length; if(allPlaced){ answered=true; mark(all); renderDDFeedback(results); feedback((all?'Correct. ':'Not quite. ')+item.explanation, all?'good':'bad'); } }
function renderDDFeedback(results) { document.querySelectorAll('.slot-target').forEach(slot=>{ const sid=slot.dataset.slot; const card=slot.querySelector('.dd-card'); if(card){ const ok=results[card.dataset.card]; slot.classList.add(ok?'correct':'wrong'); card.classList.add(ok?'correct':'wrong'); card.disabled=true; } }); }
function mark(ok) { const item=currentQ(); states[item.id]={answered:true,correct:ok}; const done=Object.values(states).filter(s=>s.answered); score=Object.values(states).filter(s=>s.answered&&s.correct).length; elScore.textContent=score; renderJump(); }
function feedback(msg,type) { const f=document.getElementById('fb'); f.className='feedback '+type; f.textContent=msg; }
function showAnswer() { const item=currentQ(); if(item.type==='mcq'){ document.querySelectorAll('.opt').forEach((b,k)=>{ b.disabled=true; if(item.options[item._shuf[k]].correct)b.classList.add('reveal'); }); } else if(item.type==='fill'){ document.querySelectorAll('input[data-fill]').forEach(inp=>{ const s=item.sentences[+inp.dataset.fill]; inp.value=s.answers[0]; inp.classList.add('correct'); inp.disabled=true; }); } else { currentDD.cards.forEach(c=>dragState.placements[c.id]=c.correctSlot); renderDDArea(item); document.querySelectorAll('.slot-target').forEach(slot=>slot.classList.add('correct')); document.querySelectorAll('.dd-card').forEach(card=>{card.classList.add('correct'); card.disabled=true;}); } answered=true; mark(false); feedback('Answer shown. Reset this question and solve it again from memory. '+item.explanation,'info'); }
function resetQuestion() { const item=currentQ(); delete states[item.id]; renderQuestion(); }
function prevQ() { pos=(pos-1+order.length)%order.length; renderQuestion(); }
function nextQ() { pos=(pos+1)%order.length; renderQuestion(); }
function renderResult() { elProg.style.width='100%'; const total=order.length; const pct=Math.round(score/total*100); const best=parseInt(lsGet(STORE_PREFIX+'best')||'0',10); if(score>best)lsSet(STORE_PREFIX+'best',String(score)); const completed=parseInt(lsGet(STORE_PREFIX+'completed')||'0',10)+1; lsSet(STORE_PREFIX+'completed',String(completed)); elCompleted.textContent=completed; elCard.innerHTML=`<div class="result"><h2>Round complete</h2><div class="score-big">${score} / ${total}</div><p>${pct}% correct</p><div class="actions" style="justify-content:center"><button class="btn" onclick="round++;startRound()">Play another round ↻</button><button class="btn ghost" onclick="lsDel(STORE_PREFIX+'best'); lsDel(STORE_PREFIX+'completed'); startRound()">Reset saved progress</button></div></div>`; }
startRound();
</script>
</body>
</html>
