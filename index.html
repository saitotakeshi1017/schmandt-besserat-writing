</style></head><body><div class="wrap"><header><h1>Chapter 10 - Tokens Mastery Quiz</h1><p>16 questions · simple words · equal-width choices · replay until it sticks 🌿</p></header><div class="bar"><span>Round <strong id="round">1</strong></span><span class="pill">Q <strong id="qIdx">1</strong> / <strong id="qTotal">16</strong></span><span>Score <strong id="score">0</strong></span><span>Best <strong id="best">-</strong></span><span>Completed <strong id="completed">0</strong></span></div><div class="qmap" id="qmap"></div><div class="progress-track"><div class="progress-fill" id="progress"></div></div><div class="card" id="card"></div><footer>Mastering Ethereum · Chapter 10 Tokens</footer></div><script>
const BANK = [{"id": "q01", "type": "mcq", "title": "ERC-20 is...", "source": "pp.6-8", "prompt": "ERC-20 is...", "options": [{"text": "a shared rule for equal tokens", "correct": true, "display": "a shared rule for equal tokens"}, {"text": "a vault rule for unique NFTs", "correct": false, "display": "a vault rule for unique NFTs  "}, {"text": "a random rule for game draws", "correct": false, "display": "a random rule for game draws  "}, {"text": "a wallet rule for gas costs", "correct": false, "display": "a wallet rule for gas costs   "}], "explanation": "ERC-20 is a common standard for fungible tokens. It defines the basic functions and events that let wallets, exchanges, and contracts handle equal token units in a shared way."}, {"id": "q02", "type": "mcq", "title": "Token versus ether", "source": "p.6 and p.22", "prompt": "Which statement best explains the core difference between ether and an ERC-20 token?", "options": [{"text": "ether lives in protocol state", "correct": true, "display": "ether lives in protocol state"}, {"text": "tokens live in contract state", "correct": false, "display": "tokens live in contract state"}, {"text": "ether moves by token mapping", "correct": false, "display": "ether moves by token mapping "}, {"text": "tokens move without contract", "correct": false, "display": "tokens move without contract "}], "explanation": "Ether balances are handled by the Ethereum protocol. ERC-20 balances are stored inside a token contract, usually in mappings."}, {"id": "q03", "type": "matching", "title": "What tokens can represent", "source": "pp.1-2", "prompt": "Match each token use with a simple example.", "pairs": [{"left": "Currency", "right": "A privately traded unit of value."}, {"left": "Resource", "right": "Storage or CPU capacity in a network."}, {"left": "Access", "right": "Permission to enter a site or room."}, {"left": "Equity", "right": "Ownership or control in an entity."}, {"left": "Attestation", "right": "A certificate of a fact or status."}, {"left": "Utility", "right": "Payment or access for a service."}], "explanation": "Tokens can represent more than money: resources, assets, access rights, equity, voting rights, collectibles, identity, attestations, and utility."}, {"id": "q04", "type": "categorize", "title": "Fungible, NFT, intrinsic, extrinsic", "source": "pp.2-4 and p.27", "prompt": "Sort each item into the best conceptual group.", "categories": ["Fungible", "Nonfungible", "Intrinsic", "Extrinsic"], "items": [{"text": "ERC-20 units of the same token", "category": "Fungible"}, {"text": "A specific CryptoKitty or art token", "category": "Nonfungible"}, {"text": "A digital item owned by private keys", "category": "Intrinsic"}, {"text": "A gold bar represented by a token", "category": "Extrinsic"}, {"text": "Interchangeable balance units", "category": "Fungible"}, {"text": "A unique token ID owned by one address", "category": "Nonfungible"}], "explanation": "Fungible units are interchangeable. NFTs represent unique items. Intrinsic assets live within blockchain rules. Extrinsic assets depend on outside law, custody, or registries."}, {"id": "q05", "type": "mcq", "title": "Counterparty risk", "source": "pp.3-4", "prompt": "What creates extra counterparty risk when a token represents a real-world asset?", "options": [{"text": "someone must honor the asset", "correct": true, "display": "someone must honor the asset"}, {"text": "tokens must use many ledgers", "correct": false, "display": "tokens must use many ledgers"}, {"text": "wallets must hide each asset", "correct": false, "display": "wallets must hide each asset"}, {"text": "miners must freeze the asset", "correct": false, "display": "miners must freeze the asset"}], "explanation": "If a token represents an external asset, someone outside the blockchain may hold the asset, recognize ownership, or enforce rights. That adds counterparty risk."}, {"id": "q06", "type": "matching", "title": "ERC-20 required interface", "source": "pp.7-9", "prompt": "Match each ERC-20 function or event with its job.", "pairs": [{"left": "totalSupply", "right": "Reports how many token units exist."}, {"left": "balanceOf", "right": "Reports the balance of one address."}, {"left": "transfer", "right": "Moves tokens from the caller to another address."}, {"left": "approve", "right": "Lets a spender use tokens up to a limit."}, {"left": "allowance", "right": "Shows what a spender may still use."}, {"left": "Transfer event", "right": "Announces a successful token move."}], "explanation": "ERC-20 compliance requires totalSupply, balanceOf, transfer, transferFrom, approve, allowance, plus Transfer and Approval events."}, {"id": "q07", "type": "mcq", "title": "Optional ERC-20 metadata", "source": "p.8", "prompt": "Which set contains only optional ERC-20 metadata fields?", "options": [{"text": "name, symbol, decimals", "correct": true, "display": "name, symbol, decimals"}, {"text": "mint, burn, cap, pause", "correct": false, "display": "mint, burn, cap, pause"}, {"text": "owner, URI, royalty", "correct": false, "display": "owner, URI, royalty   "}, {"text": "nonce, permit, signer", "correct": false, "display": "nonce, permit, signer "}], "explanation": "name, symbol, and decimals are optional ERC-20 fields. decimals tells how many small units make one display token."}, {"id": "q08", "type": "sequence", "title": "Simple ERC-20 transfer flow", "source": "p.9", "prompt": "Put the direct transfer workflow in order.", "items": ["Alice asks the token contract to transfer tokens to Bob.", "The token contract subtracts units from Alice.", "The token contract adds units to Bob.", "The token contract emits a Transfer event."], "explanation": "ERC-20 transfer is a single token-contract transaction: call transfer, adjust mappings, then emit Transfer."}, {"id": "q09", "type": "mcq", "title": "approve plus transferFrom", "source": "pp.9-10 and pp.19-21", "prompt": "What does approve plus transferFrom mainly allow?", "options": [{"text": "a spender moves allowed tokens", "correct": true, "display": "a spender moves allowed tokens"}, {"text": "a miner mints allowed tokens", "correct": false, "display": "a miner mints allowed tokens  "}, {"text": "a wallet deletes lost tokens", "correct": false, "display": "a wallet deletes lost tokens  "}, {"text": "a buyer pays gas using tokens", "correct": false, "display": "a buyer pays gas using tokens "}], "explanation": "approve sets an allowance. transferFrom lets the approved spender move tokens from the owner up to that limit. This is how METFaucet can distribute MET after approval."}, {"id": "q10", "type": "mcq", "title": "ERC-2612 permit", "source": "pp.10-11 and p.23", "prompt": "What is the simple idea behind ERC-2612 permit?", "options": [{"text": "sign approval without gas", "correct": true, "display": "sign approval without gas "}, {"text": "burn tokens without owner", "correct": false, "display": "burn tokens without owner "}, {"text": "mint tokens without supply", "correct": false, "display": "mint tokens without supply"}, {"text": "query tokens without IDs", "correct": false, "display": "query tokens without IDs  "}], "explanation": "ERC-2612 lets a user sign approval data off-chain. Another party submits that signature to permit, so the user does not need to send the approval transaction themselves."}, {"id": "q11", "type": "sequence", "title": "Building METoken with Foundry", "source": "pp.11-14", "prompt": "Put the basic METoken build and deploy path in order.", "items": ["Create and initialize the Foundry project with forge init.", "Install OpenZeppelin contracts into the project.", "Write METoken.sol inheriting from ERC20.", "Mint the initial supply to msg.sender in the constructor.", "Run forge build, then deploy with a script or forge create."], "explanation": "The chapter builds METoken with Foundry, OpenZeppelin ERC20 inheritance, a constructor, _mint(msg.sender, initialSupply), compilation, and deployment."}, {"id": "q12", "type": "mcq", "title": "Decimals and token amounts", "source": "pp.12-16", "prompt": "If an ERC-20 uses 18 decimals, what does 50e18 mean?", "options": [{"text": "50 display tokens", "correct": true, "display": "50 display tokens  "}, {"text": "50 token ledgers", "correct": false, "display": "50 token ledgers   "}, {"text": "50 owner approvals", "correct": false, "display": "50 owner approvals "}, {"text": "50 contract wallets", "correct": false, "display": "50 contract wallets"}], "explanation": "With 18 decimals, one display token is 10^18 smallest units. So 50e18 means 50 full display tokens."}, {"id": "q13", "type": "mcq", "title": "Tokens stuck in contracts", "source": "pp.16-18 and p.22", "prompt": "Why can MET sent to NaiveFaucet become stuck forever?", "options": [{"text": "faucet cannot call transfer", "correct": true, "display": "faucet cannot call transfer "}, {"text": "Alice lacks enough ether gas", "correct": false, "display": "Alice lacks enough ether gas"}, {"text": "MET has no token contract", "correct": false, "display": "MET has no token contract   "}, {"text": "Anvil hides token balances", "correct": false, "display": "Anvil hides token balances  "}], "explanation": "NaiveFaucet can withdraw ether, but it has no code to call the ERC-20 token contract and move its MET balance. Only the contract address can move that balance."}, {"id": "q14", "type": "sequence", "title": "METFaucet distribution logic", "source": "pp.18-21", "prompt": "Arrange the approve and withdrawal flow used by METFaucet.", "items": ["Deploy METFaucet with the token address and MET owner address.", "The MET owner approves the faucet as a spender.", "Alice calls withdraw on the faucet contract.", "The faucet calls transferFrom on METoken.", "METoken moves tokens from the owner to Alice."], "explanation": "METFaucet does not hold the tokens directly. It spends from the owner through transferFrom after the owner has approved it."}, {"id": "q15", "type": "matching", "title": "Other token standards", "source": "pp.23-30 and pp.31-32", "prompt": "Match each standard with its main idea.", "pairs": [{"left": "ERC-223", "right": "Uses tokenFallback to reduce lost token transfers."}, {"left": "ERC-777", "right": "Uses hooks such as tokensReceived and tokensToSend."}, {"left": "ERC-721", "right": "Represents unique NFTs using token IDs."}, {"left": "ERC-1155", "right": "Manages many token types in one contract."}, {"left": "EIP-165", "right": "Lets contracts report supported interfaces."}, {"left": "ERC-1820", "right": "Uses a registry for interface support."}], "explanation": "ERC-223 tries to prevent accidental transfers to non-supporting contracts. ERC-777 uses hooks and operators. ERC-721 is the NFT standard. ERC-1155 handles multiple token types. EIP-165 reports interfaces; ERC-1820 uses a registry."}, {"id": "q16", "type": "mcq", "title": "Standards and security", "source": "pp.30-35", "prompt": "What is the safest general attitude toward token standards and libraries?", "options": [{"text": "reuse tested standards", "correct": true, "display": "reuse tested standards "}, {"text": "write all code yourself", "correct": false, "display": "write all code yourself"}, {"text": "hide interface support", "correct": false, "display": "hide interface support "}, {"text": "add code without review", "correct": false, "display": "add code without review"}], "explanation": "Token standards give interoperability. Battle-tested libraries like OpenZeppelin reduce risk. Extra custom code can increase attack surface, so extensions should be careful and purposeful."}];
const elCard=document.getElementById('card'),elQIdx=document.getElementById('qIdx'),elQTotal=document.getElementById('qTotal'),elScore=document.getElementById('score'),elRound=document.getElementById('round'),elBest=document.getElementById('best'),elProg=document.getElementById('progress'),elCompleted=document.getElementById('completed'),elQMap=document.getElementById('qmap');let order=[],pos=0,score=0,round=1,wrongLog=[],answered=false,results={},dragState={selected:null,placements:{}},currentDD=null;elQTotal.textContent=BANK.length;function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}function lsDel(k){try{localStorage.removeItem(k)}catch(e){}}function startRound(){order=shuffle(BANK.map((_,i)=>i));pos=0;score=0;wrongLog=[];answered=false;results={};elScore.textContent='0';elRound.textContent=round;elBest.textContent=lsGet('tokens_v3_best')||'-';elCompleted.textContent=lsGet('tokens_v3_completed')||'0';renderQuestion()}function renderMap(){elQMap.innerHTML='';order.forEach((qi,i)=>{const id=BANK[qi].id;const b=document.createElement('button');b.className='jump '+(i===pos?'current ':'')+(results[id]?.done?(results[id].correct?'done':'wrong'):'');b.textContent=i+1;b.onclick=()=>{pos=i;renderQuestion()};elQMap.appendChild(b)})}function renderQuestion(){if(pos>=order.length)return renderResult();answered=false;dragState={selected:null,placements:{}};currentDD=null;const item=BANK[order[pos]];elQIdx.textContent=pos+1;elProg.style.width=(pos/order.length*100)+'%';const tagMap={mcq:'Multiple choice',matching:'Drag & match',sequence:'Drag & order',categorize:'Drag & sort'};let html=`<div class="qnum">Question ${pos+1} of ${order.length}<span class="qtype-tag">${tagMap[item.type]}</span></div><p class="qtext">${item.prompt}</p>`;if(item.type==='mcq')html+=renderMC(item);else html+=renderDD(item);html+=`<div class="feedback" id="fb"></div><div class="actions"><button class="btn ghost" onclick="prevQ()">Previous</button><button class="btn ghost" onclick="nextQ()">Next</button><button class="btn ghost" onclick="showAnswer()">Show answer</button><button class="btn ghost" onclick="resetQuestion()">Reset question</button></div>`;elCard.innerHTML=html;if(item.type==='mcq')attachMC(item);else attachDD(item);renderMap()}function renderMC(item){const idxs=item.options.map((_,i)=>i);item._shuf=shuffle(idxs);return '<div class="options">'+item._shuf.map((orig,i)=>`<button class="opt" data-i="${i}"><span class="marker">${String.fromCharCode(65+i)}</span>${escapeHTML(item.options[orig].display)}</button>`).join('')+'</div>'}function attachMC(item){document.querySelectorAll('.opt').forEach(btn=>{btn.onclick=()=>{if(answered)return;answered=true;const i=parseInt(btn.dataset.i),orig=item._shuf[i],ok=item.options[orig].correct;document.querySelectorAll('.opt').forEach(b=>b.disabled=true);if(ok){btn.classList.add('correct');score++}else{btn.classList.add('wrong');document.querySelectorAll('.opt')[item._shuf.findIndex(k=>item.options[k].correct)].classList.add('reveal');wrongLog.push({q:item.title,info:item.options.find(o=>o.correct).text})}results[item.id]={done:true,correct:ok};elScore.textContent=score;feedback((ok?'Correct! ':'Not quite. ')+item.explanation,ok);renderMap()}})}function setupDD(item){let cards,slots,slotOrder;if(item.type==='matching'){cards=item.pairs.map((p,i)=>({id:'c'+i,text:p.right,correctSlot:'s'+i}));slots=item.pairs.map((p,i)=>({id:'s'+i,label:p.left,multi:false}));slotOrder=shuffle(slots.map(s=>s.id))}else if(item.type==='sequence'){cards=item.items.map((t,i)=>({id:'c'+i,text:t,correctSlot:'s'+i}));slots=item.items.map((_,i)=>({id:'s'+i,label:String(i+1),multi:false}));slotOrder=slots.map(s=>s.id)}else{cards=item.items.map((it,i)=>({id:'c'+i,text:it.text,correctSlot:'s'+item.categories.indexOf(it.category)}));slots=item.categories.map((cat,i)=>({id:'s'+i,label:cat,multi:true}));slotOrder=slots.map(s=>s.id)}return{cards,slots,cardOrder:shuffle(cards.map(c=>c.id)),slotOrder,type:item.type}}function renderDD(item){currentDD=setupDD(item);return `<div class="dd-hint">Tap a card, then tap its slot. Tap a placed card to send it back.</div><div id="ddArea"></div>`}function attachDD(item){renderDDArea(item)}function renderDDArea(item){const area=document.getElementById('ddArea');let h='';if(currentDD.type==='sequence')h+=renderOrderSlots();else if(currentDD.type==='matching')h+=renderMatchSlots();else h+=renderCatSlots();const inBank=currentDD.cardOrder.filter(cid=>!dragState.placements[cid]);h+=`<div class="card-bank"><div class="card-bank-label">Cards (${inBank.length} left)</div><div class="card-bank-cards">`;if(!inBank.length)h+='<div class="empty-hint">All placed</div>';else inBank.forEach(cid=>{const c=currentDD.cards.find(x=>x.id===cid);h+=`<button class="dd-card${dragState.selected===cid?' selected':''}" data-card="${cid}">${escapeHTML(c.text)}</button>`});h+='</div></div>';area.innerHTML=h;area.querySelectorAll('.dd-card').forEach(el=>{el.onclick=e=>{e.stopPropagation();onCardClick(item,el.dataset.card)}});area.querySelectorAll('[data-slot]').forEach(el=>{el.onclick=()=>onSlotClick(item,el.dataset.slot)});if(currentDD.cards.every(c=>dragState.placements[c.id]))checkDD(item,false)}function renderOrderSlots(){return '<div class="order-list">'+currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid);return `<div class="order-row"><div class="order-num">${slot.label}</div>${slotHTML(sid)}</div>`}).join('')+'</div>'}function renderMatchSlots(){return '<div class="match-list">'+currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid);return `<div class="match-row"><div class="match-label">${escapeHTML(slot.label)}</div>${slotHTML(sid)}</div>`}).join('')+'</div>'}function renderCatSlots(){return '<div class="cat-zones">'+currentDD.slotOrder.map(sid=>{const slot=currentDD.slots.find(s=>s.id===sid),cards=Object.keys(dragState.placements).filter(cid=>dragState.placements[cid]===sid);return `<div class="cat-zone" data-slot="${sid}"><div class="cat-zone-label">${escapeHTML(slot.label)}</div><div class="cat-zone-cards">${cards.length?cards.map(cid=>{const c=currentDD.cards.find(x=>x.id===cid);return `<button class="dd-card" data-card="${cid}">${escapeHTML(c.text)}</button>`}).join(''):'<span class="placeholder">drop cards here</span>'}</div></div>`}).join('')+'</div>'}function slotHTML(sid){const cid=Object.keys(dragState.placements).find(c=>dragState.placements[c]===sid);if(cid){const c=currentDD.cards.find(x=>x.id===cid);return `<div class="slot-target has-card" data-slot="${sid}"><button class="dd-card" data-card="${cid}">${escapeHTML(c.text)}</button></div>`}return `<div class="slot-target" data-slot="${sid}"><span class="placeholder">tap to place</span></div>`}function onCardClick(item,cid){if(answered)return;if(dragState.placements[cid]){delete dragState.placements[cid];dragState.selected=null}else dragState.selected=dragState.selected===cid?null:cid;renderDDArea(item)}function onSlotClick(item,sid){if(answered||!dragState.selected)return;const slot=currentDD.slots.find(s=>s.id===sid);if(!slot.multi)Object.keys(dragState.placements).forEach(cid=>{if(dragState.placements[cid]===sid)delete dragState.placements[cid]});dragState.placements[dragState.selected]=sid;dragState.selected=null;renderDDArea(item)}function checkDD(item,showMsg=true){if(answered)return;const all=currentDD.cards.every(c=>dragState.placements[c.id]);if(!all)return;answered=true;let count=0;currentDD.cards.forEach(c=>{if(dragState.placements[c.id]===c.correctSlot)count++});const ok=count===currentDD.cards.length;if(ok)score++;else wrongLog.push({q:item.title,info:`${count}/${currentDD.cards.length} placements correct`});results[item.id]={done:true,correct:ok};elScore.textContent=score;renderDDFeedback();feedback((ok?'Correct! ':'Not yet. ')+item.explanation,ok);renderMap()}function renderDDFeedback(){document.querySelectorAll('.target,.slot-target,.cat-zone').forEach(x=>x.classList.remove('correct','wrong'));document.querySelectorAll('.slot-target').forEach(t=>{const card=t.querySelector('.dd-card');if(!card)return;const cid=card.dataset.card,ok=dragState.placements[cid]===t.dataset.slot;t.classList.add(ok?'correct':'wrong');card.classList.add(ok?'correct':'wrong')})}function showAnswer(){const item=BANK[order[pos]];answered=true;if(item.type==='mcq'){document.querySelectorAll('.opt').forEach((b,k)=>{b.disabled=true;if(item.options[item._shuf[k]].correct)b.classList.add('reveal')});feedback('Answer shown. '+item.explanation,true)}else{dragState.placements={};currentDD.cards.forEach(c=>dragState.placements[c.id]=c.correctSlot);renderDDArea(item);document.querySelectorAll('.slot-target').forEach(t=>t.classList.add('correct'));document.querySelectorAll('.dd-card').forEach(c=>c.classList.add('correct'));feedback('Answer shown. '+item.explanation,true)}}function resetQuestion(){renderQuestion()}function feedback(msg,good){const f=document.getElementById('fb');f.className='feedback '+(good?'good':'bad');f.innerHTML=msg}function prevQ(){pos=(pos-1+order.length)%order.length;renderQuestion()}function nextQ(){pos++; if(pos>=order.length) renderResult(); else renderQuestion()}function renderResult(){elProg.style.width='100%';const total=order.length,pct=Math.round(score/total*100);const best=parseInt(lsGet('tokens_v3_best')||'0',10);if(score>best){lsSet('tokens_v3_best',String(score));elBest.textContent=score}lsSet('tokens_v3_completed',String(parseInt(lsGet('tokens_v3_completed')||'0',10)+1));elCompleted.textContent=lsGet('tokens_v3_completed');elCard.innerHTML=`<div class="result"><h2>Round complete</h2><div class="score-big">${score} / ${total}</div><p>${pct}% correct</p><div class="actions"><button class="btn" onclick="round++;startRound()">Play another round</button><button class="btn ghost" onclick="lsDel('tokens_v3_best');elBest.textContent='-'">Reset best</button></div>${wrongLog.length?'<div class="review-list"><h3>Review</h3>'+wrongLog.map(w=>`<div class="review-item"><b>${escapeHTML(w.q)}</b><br>${escapeHTML(w.info)}</div>`).join('')+'</div>':'<p>No mistakes this round.</p>'}</div>`}startRound();
</script></body></html>
